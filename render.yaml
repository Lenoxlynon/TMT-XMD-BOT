# render.yaml - TMT-XMD-BOT Blueprint
services:
  # Main WhatsApp Bot
  - type: web
    name: tmt-xmd-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
    healthCheckPath: /

  # Pairing Code Generator
  - type: web
    name: tmt-xmd-pairing
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node pairing.js
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: PORT
        value: 3000
    healthCheckPath: /
